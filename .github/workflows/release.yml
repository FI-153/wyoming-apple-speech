name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    permissions:
      contents: write  # needed to create the GitHub release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run Swift tests
        run: make swift-test

      - name: Build release tarball
        id: tarball
        run: |
          ./packaging/build-release-tarball.sh "${{ steps.version.outputs.version }}"
          TARBALL="dist/wyoming-apple-stt-${{ steps.version.outputs.version }}.tar.gz"
          SHA="$(shasum -a 256 "${TARBALL}" | awk '{print $1}')"
          echo "path=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.tarball.outputs.path }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Render formula and push to tap
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.tarball.outputs.sha256 }}
        run: |
          set -euo pipefail

          URL="https://github.com/FI-153/wyoming-apple-stt/releases/download/v${VERSION}/wyoming-apple-stt-${VERSION}.tar.gz"

          URL="${URL}" python3 - <<'PY'
          import os
          from pathlib import Path
          tpl = Path("packaging/formula.rb.template").read_text()
          resources = Path("packaging/python-resources.rb").read_text().rstrip()
          rendered = (
              tpl
              .replace("{{URL}}", os.environ["URL"])
              .replace("{{VERSION}}", os.environ["VERSION"])
              .replace("{{SHA256}}", os.environ["SHA256"])
              .replace("{{PYTHON_RESOURCES}}", resources)
          )
          Path("wyoming-apple-stt.rb").write_text(rendered)
          PY

          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/FI-153/homebrew-tap.git" tap
          mkdir -p tap/Formula
          mv wyoming-apple-stt.rb tap/Formula/wyoming-apple-stt.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/wyoming-apple-stt.rb
          git commit -m "wyoming-apple-stt ${VERSION}"
          git push origin HEAD:main
