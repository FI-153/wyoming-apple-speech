name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  python:
    name: Python tests and quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python tests
        run: make test

      - name: Run linter and type checker
        run: make quality

  swift:
    name: Swift tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Swift tests
        run: make swift-test
